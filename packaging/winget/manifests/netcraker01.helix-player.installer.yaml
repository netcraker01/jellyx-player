# winget Installer Manifest
# =============================================================================
# REPLACE all placeholder values before submission:
#   - REPLACE_WITH_ACTUAL_SHA256_X64  → actual SHA256 of the x64 MSI installer
#   - REPLACE_WITH_WIX_PRODUCT_CODE    → product code from the MSI
#   - REPLACE_WITH_WIX_UPGRADE_CODE    → upgrade code from the MSI
#   - URLs                             → actual GitHub release download URLs
#
# Generate SHA256:
#   Get-FileHash .\Helix_0.1.0_x64_en-US.msi -Algorithm SHA256
#
# Extract product/upgrade codes from the MSI:
#   lessmsi l Helix_0.1.0_x64_en-US.msi
# =============================================================================
PackageIdentifier: netcraker01.helix-player
PackageVersion: 0.1.0
Platform:
  - Windows.Desktop
MinimumOSVersion: 10.0.17763.0
Scope: machine
InstallModes:
  - interactive
  - silent
  - silentWithProgress
UpgradeBehavior: install
Commands:
  - helix
Protocols:
  - helix
FileExtensions: []
Dependencies:
  PackageDependencies:
    - PackageIdentifier: Microsoft.EdgeWebView2Runtime
AppsAndFeaturesEntries:
  - DisplayName: Helix
    Publisher: netcraker01
    DisplayVersion: "0.1.0"
    ProductCode: "{REPLACE_WITH_WIX_PRODUCT_CODE}"
    UpgradeCode: "{REPLACE_WITH_WIX_UPGRADE_CODE}"
Installers:
  - Architecture: x64
    InstallerType: wix
    InstallerUrl: https://github.com/netcraker01/helix/releases/download/v0.1.0/Helix_0.1.0_x64_en-US.msi
    InstallerSha256: REPLACE_WITH_ACTUAL_SHA256_X64
    ProductCode: "{REPLACE_WITH_WIX_PRODUCT_CODE}"
  # Uncomment when shipping ARM64 builds:
  # - Architecture: arm64
  #   InstallerType: wix
  #   InstallerUrl: https://github.com/netcraker01/helix/releases/download/v0.1.0/Helix_0.1.0_arm64_en-US.msi
  #   InstallerSha256: REPLACE_WITH_ACTUAL_SHA256_ARM64
  #   ProductCode: "{REPLACE_WITH_WIX_PRODUCT_CODE_ARM64}"
ManifestType: installer
ManifestVersion: 1.6.0