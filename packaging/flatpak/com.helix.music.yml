# Flatpak / Flathub build manifest for Helix
# =============================================================================
# App ID: com.helix.music
# Based on the Tauri v2 + Rust + Svelte stack.
#
# NOTE: This is a PREPARATION scaffold. Before submitting to Flathub:
#   1. Replace version placeholders with actual release values.
#   2. Generate SHA256 checksums from the actual release tarball.
#   3. Test with `flatpak-builder --repo=repo --force-clean build-dir com.helix.music.yml`
#   4. Follow https://docs.flathub.org/docs/for-app-authors/submission/
#   5. Submit via https://github.com/flathub/flathub/pulls
#
# Architecture considerations:
#   - Tauri v2 uses WebKitGTK on Linux (not Electron), which is Flatpak-friendly.
#   - yt-dlp is NOT bundled — the app auto-downloads it on first run.
#   - The Rust binary is statically linked except for glibc and a few system libs.
# =============================================================================

app-id: com.helix.music
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22
command: helix

# Finish-args control sandbox permissions.
# Helix needs: network (streaming), audio (playback), GPU (visualizer), file access (local music).
finish-args:
  - --share=network          # Network access for streaming (YouTube, SoundCloud, etc.)
  - --share=ipc               # Required for Wayland/X11 shared memory
  - --socket=fallback-x11     # X11 support (fallback for non-Wayland)
  - --socket=wayland           # Wayland support
  - --device=dri               # GPU access for WGPU visualizer
  - --socket=pulseaudio        # Audio playback via PulseAudio/PipeWire
  - --filesystem=xdg-music:ro # Read access to user's Music directory
  - --filesystem=xdg-videos:ro # Read access to user's Videos directory (for local playback)
  - --talk-name=org.freedesktop.Notifications  # Desktop notifications

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  env:
    CARGO_HOME: /run/build/helix/cargo
    npm_config_nodedir: /usr/lib/sdk/node22

# Cleanup unnecessary files from the final Flatpak
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - '*.a'
  - '*.la'

modules:
  # ── Node.js frontend ────────────────────────────────────────
  - name: helix-ui
    buildsystem: simple
    build-commands:
      - cd ui && npm install && npm run build
    sources:
      - type: dir
        path: ui

  # ── Rust backend + Tauri app ────────────────────────────────
  - name: helix
    buildsystem: simple
    build-commands:
      # Build the Tauri binary
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      # Install the binary
      - install -Dm755 src-tauri/target/release/helix /app/bin/helix
      # Install icons
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.helix.music.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.helix.music.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/com.helix.music.png
      # Install desktop entry
      - install -Dm644 packaging/flatpak/com.helix.music.desktop /app/share/applications/com.helix.music.desktop
      # Install metainfo
      - install -Dm644 packaging/flatpak/com.helix.music.metainfo.xml /app/share/metainfo/com.helix.music.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/netcraker01/helix/archive/refs/tags/v0.1.0.tar.gz
        sha256: d3a8de2dbe9b1270b75a70f200ef57960351efc719be15f41e5b61b6aa2572a8

      # Cargo dependencies (vendored) — generated by `flatpak-cargo-generator`
      - cargo-sources.json
