ShortDescription: Helix Player is a desktop background music player for people who work with music on
Description: >
  Helix Player is a desktop background music player for people who work with music on.
  It lets you listen to YouTube, SoundCloud, and local files in a native desktop app
  without accounts, subscriptions, or unnecessary video playback.

  It includes queue management, playlists, favorites, listening history, and real-time
  visualizers for users who want a more expressive player view during long work sessions.

  yt-dlp is automatically downloaded on first launch for streaming support.
  Alternatively, install yt-dlp separately: winget install yt-dlp
