app-id: com.helix.music
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22
command: helix

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=xdg-music:ro
  - --filesystem=xdg-videos:ro
  - --talk-name=org.freedesktop.Notifications

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  env:
    CARGO_HOME: /run/build/helix/cargo
    npm_config_nodedir: /usr/lib/sdk/node22

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - '*.a'
  - '*.la'

modules:
  - name: helix-ui
    buildsystem: simple
    build-commands:
      - cd ui && npm install && npm run build
    sources:
      - type: archive
        url: https://github.com/netcraker01/helix/archive/92f424c3d61f3229d967628c04cc4386b1b8bb3e.tar.gz
        sha256: c4b2f81a3622f9c477b8ab63c96ab5442d4c4c95404f54b1b997f690b00cab06
      - cargo-sources.json

  - name: helix
    buildsystem: simple
    build-commands:
      - cargo build --release --manifest-path helix-desktop/Cargo.toml
      - install -Dm755 target/release/helix /app/bin/helix
      - install -Dm644 helix-desktop/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.helix.music.png
      - install -Dm644 helix-desktop/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.helix.music.png
      - install -Dm644 helix-desktop/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/com.helix.music.png
      - install -Dm644 packaging/flatpak/com.helix.music.desktop /app/share/applications/com.helix.music.desktop
      - install -Dm644 packaging/flatpak/com.helix.music.metainfo.xml /app/share/metainfo/com.helix.music.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/netcraker01/helix/archive/92f424c3d61f3229d967628c04cc4386b1b8bb3e.tar.gz
        sha256: c4b2f81a3622f9c477b8ab63c96ab5442d4c4c95404f54b1b997f690b00cab06
      - cargo-sources.json