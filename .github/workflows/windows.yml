# =============================================================================
# Helix Player — Windows Build (CI validation)
# =============================================================================
# Builds both Windows installer formats on every push to main and on PRs.
# This is CI validation only — it produces artifacts for review, NOT release.
#
# The release pipeline lives in .github/workflows/release.yml, which is the
# single source of truth for publishing (triggers on v* tags and attaches
# artifacts to the GitHub Release). This workflow does NOT run on tags, so
# there is no duplicate-build race on release.
#
# Outputs:
#   - MSI installer (for winget and managed deployments)
#   - NSIS setup.exe  (recommended for direct user installs)
#   - SHA256 checksum files alongside each artifact
#
# After a successful build, extract winget metadata with:
#   scripts/inspect-msi.ps1 -MsiPath <path-to-msi>
#
# Code signing: See docs/packaging.md > "Windows Code Signing" for signtool /
# Azure Trusted Signing setup. This workflow does NOT sign artifacts.
# Unsigned installers may trigger Windows SmartScreen / Defender / org policy
# warnings on Windows 11.
# =============================================================================

name: Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows Installers
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install root npm dependencies
        run: npm ci

      - name: Install UI npm dependencies
        run: npm ci
        working-directory: ui

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      # ---- Build both MSI and NSIS in one pass ----
      # Tauri's bundler can produce both formats in a single invocation.
      # Using --bundles msi,nsis builds the app once and packages it twice.
      - name: Build MSI and NSIS
        run: cargo tauri build --bundles msi,nsis

      # ---- Locate portable .exe (no installer) ----
      - name: Locate portable exe
        id: portable
        shell: pwsh
        run: |
          $searchDirs = @(
            "target/release",
            "helix-desktop/target/release"
          )
          $exeFile = $null
          foreach ($dir in $searchDirs) {
            if (Test-Path $dir) {
              $candidate = Get-ChildItem -Path $dir -Filter "helix.exe" | Select-Object -First 1
              if ($candidate) {
                $exeFile = $candidate
                break
              }
            }
          }
          if (-not $exeFile) {
            Write-Error "No portable helix.exe found in expected directories: $($searchDirs -join ', ')"
            exit 1
          }
          Write-Host "Portable exe found: $($exeFile.FullName)"
          $hash = (Get-FileHash -Path $exeFile.FullName -Algorithm SHA256).Hash
          $hashFile = "$($exeFile.FullName).sha256"
          "$hash  $($exeFile.Name)" | Out-File -FilePath $hashFile -Encoding utf8 -NoNewline
          echo "exe_path=$($exeFile.FullName)" >> $env:GITHUB_OUTPUT
          echo "exe_name=$($exeFile.Name)" >> $env:GITHUB_OUTPUT
          echo "sha256_file=$hashFile" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $hash"

      # ---- Locate and process MSI ----
      - name: Locate MSI output
        id: msi
        shell: pwsh
        run: |
          $searchDirs = @(
            "target/release/bundle/msi",
            "helix-desktop/target/release/bundle/msi"
          )

          $msiFile = $null
          foreach ($dir in $searchDirs) {
            if (Test-Path $dir) {
              $candidate = Get-ChildItem -Path $dir -Filter "*.msi" | Select-Object -First 1
              if ($candidate) {
                $msiFile = $candidate
                break
              }
            }
          }

          if (-not $msiFile) {
            Write-Error "No MSI file found in expected directories: $($searchDirs -join ', ')"
            exit 1
          }

          Write-Host "MSI found: $($msiFile.FullName)"

          # Generate SHA256 checksum
          $hash = (Get-FileHash -Path $msiFile.FullName -Algorithm SHA256).Hash
          $hashFile = "$($msiFile.FullName).sha256"
          "$hash  $($msiFile.Name)" | Out-File -FilePath $hashFile -Encoding utf8 -NoNewline

          # Extract version from tag or Cargo.toml
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if ($version -match '^\d+\.\d+\.\d+') {
            $version = $Matches[0]
          } else {
            $version = (Select-String -Path "helix-desktop/Cargo.toml" -Pattern '^version = "([^"]+)"' | Select-Object -First 1).Matches.Groups[1].Value
          }

          echo "msi_path=$($msiFile.FullName)" >> $env:GITHUB_OUTPUT
          echo "msi_name=$($msiFile.Name)" >> $env:GITHUB_OUTPUT
          echo "msi_dir=$($msiFile.DirectoryName)" >> $env:GITHUB_OUTPUT
          echo "sha256_file=$hashFile" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT

          Write-Host "SHA256: $hash"
          Write-Host "Version: $version"

      # ---- Locate and process NSIS setup.exe ----
      - name: Locate NSIS output
        id: nsis
        shell: pwsh
        run: |
          $searchDirs = @(
            "target/release/bundle/nsis",
            "helix-desktop/target/release/bundle/nsis"
          )

          $nsisFile = $null
          foreach ($dir in $searchDirs) {
            if (Test-Path $dir) {
              # NSIS produces a setup .exe file
              $candidate = Get-ChildItem -Path $dir -Filter "*setup*.exe" | Select-Object -First 1
              if (-not $candidate) {
                # Fallback: any .exe in the nsis bundle dir (excluding the app executable)
                $candidate = Get-ChildItem -Path $dir -Filter "*.exe" | Select-Object -First 1
              }
              if ($candidate) {
                $nsisFile = $candidate
                break
              }
            }
          }

          if (-not $nsisFile) {
            Write-Error "No NSIS setup.exe found in expected directories: $($searchDirs -join ', ')"
            exit 1
          }

          Write-Host "NSIS found: $($nsisFile.FullName)"

          # Generate SHA256 checksum
          $hash = (Get-FileHash -Path $nsisFile.FullName -Algorithm SHA256).Hash
          $hashFile = "$($nsisFile.FullName).sha256"
          "$hash  $($nsisFile.Name)" | Out-File -FilePath $hashFile -Encoding utf8 -NoNewline

          echo "nsis_path=$($nsisFile.FullName)" >> $env:GITHUB_OUTPUT
          echo "nsis_name=$($nsisFile.Name)" >> $env:GITHUB_OUTPUT
          echo "nsis_dir=$($nsisFile.DirectoryName)" >> $env:GITHUB_OUTPUT
          echo "nsis_sha256_file=$hashFile" >> $env:GITHUB_OUTPUT

          Write-Host "SHA256: $hash"

      # ---- Inspect MSI metadata (for winget) ----
      - name: Inspect MSI metadata
        id: inspect
        shell: pwsh
        run: |
          $outFile = Join-Path (Split-Path "${{ steps.msi.outputs.msi_path }}") "msi-metadata.txt"
          .\scripts\inspect-msi.ps1 -MsiPath "${{ steps.msi.outputs.msi_path }}" | Tee-Object -FilePath $outFile
          echo "metadata_file=$outFile" >> $env:GITHUB_OUTPUT

      - name: Get WiX Upgrade Code
        id: wix
        shell: pwsh
        run: |
          $upgradeCode = cargo tauri inspect wix-upgrade-code 2>&1 | Select-String -Pattern '\{[0-9a-fA-F-]+\}'
          if ($upgradeCode) {
            echo "upgrade_code=$($upgradeCode.Matches.Value)" >> $env:GITHUB_OUTPUT
            Write-Host "Upgrade Code: $($upgradeCode.Matches.Value)"
          } else {
            Write-Host "Could not extract upgrade code from tauri inspect"
          }

      # ---- Upload artifacts ----
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: helix-player-msi-${{ steps.msi.outputs.version }}
          path: |
            ${{ steps.msi.outputs.msi_path }}
            ${{ steps.msi.outputs.sha256_file }}
            ${{ steps.inspect.outputs.metadata_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: helix-player-setup-${{ steps.msi.outputs.version }}
          path: |
            ${{ steps.nsis.outputs.nsis_path }}
            ${{ steps.nsis.outputs.nsis_sha256_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: helix-player-portable-${{ steps.msi.outputs.version }}
          path: |
            ${{ steps.portable.outputs.exe_path }}
            ${{ steps.portable.outputs.sha256_file }}
          if-no-files-found: error
          retention-days: 30

      # ---- Build summary ----
      # NOTE: release publishing is handled by .github/workflows/release.yml.
      # This CI workflow uploads artifacts only — no GitHub Release upload.
      - name: Output build summary
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "  Helix Player — Windows Build Output"
          Write-Host "=========================================="
          Write-Host ""
          Write-Host "MSI file:       ${{ steps.msi.outputs.msi_name }}"
          Write-Host "NSIS file:      ${{ steps.nsis.outputs.nsis_name }}"
          Write-Host "Version:        ${{ steps.msi.outputs.version }}"
          Write-Host "Upgrade Code:   ${{ steps.wix.outputs.upgrade_code }}"
          Write-Host ""
          Write-Host "Installers:"
          Write-Host "  • MSI  → for winget and managed installs"
          Write-Host "  • NSIS → recommended for direct user installs"
          Write-Host ""
          Write-Host "For winget manifests, you need:"
          Write-Host "  1. SHA256:      see .sha256 file in MSI artifact"
          Write-Host "  2. ProductCode: see msi-metadata.txt in MSI artifact"
          Write-Host "  3. UpgradeCode: see msi-metadata.txt in MSI artifact"
          Write-Host ""
          Write-Host "NOTE: These installers are UNSIGNED."
          Write-Host "  Unsigned installers may trigger Windows SmartScreen,"
          Write-Host "  Defender, or org policy warnings on Windows 11."
          Write-Host "  See docs/packaging.md for code signing setup."
          Write-Host ""