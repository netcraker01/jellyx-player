# =============================================================================
# Jellyx Player — Release Pipeline (Linux, Windows, and macOS)
# =============================================================================
# Builds Linux (AppImage, .deb, .rpm) and Windows (MSI, NSIS, portable exe)
# on a v* tag push. Assets remain workflow artifacts until every platform has
# passed; only the final promotion job creates and publishes the release.
#
# macOS DMGs are built through the reusable macOS workflow and join the same
# final promotion gate.
#
# Trigger: push of a version tag matching v* (for example, v0.4.1) or manual dispatch.
#
# Two jobs run in parallel:
#   - build-linux   → AppImage (NO_STRIP=1), .deb, .rpm
#   - build-windows → MSI, NSIS setup.exe, portable jellyx.exe
#
# Each job:
#   1. Builds its platform artifacts
#   2. Generates SHA256 checksum files (.sha256 alongside each artifact)
#   3. Uploads build artifacts to the workflow run (30-day retention)
#   4. Uploads artifacts + checksums only to the workflow run
#
# CI validation (push to main, PRs) is handled separately by:
#   - .github/workflows/windows.yml
#   - .github/workflows/macos-dmg.yml
#
# To publish a new release:
#   git tag v0.4.1
#   git push origin v0.4.1
# The final job creates a draft, validates every staged asset, then publishes.
#
# Note on code signing: Windows artifacts are UNSIGNED by default.
# See docs/packaging.md > "Windows Code Signing" for Azure Trusted Signing
# or signtool integration. Signing steps can be added to build-windows below.
# =============================================================================

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    # Manual releases are always pinned to the current protected main head.
    # Arbitrary commits and tag names are intentionally not accepted.

# Build jobs run untrusted dependency and build code with read-only tokens.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:

  authorize-release:
    name: Authorize protected-main release target
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      checks: read
    outputs:
      sha: ${{ steps.authorize.outputs.sha }}
      tag: ${{ steps.authorize.outputs.tag }}
      version: ${{ steps.authorize.outputs.version }}
    steps:
      - name: Checkout candidate without credentials
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.sha || 'main' }}
          persist-credentials: false
          fetch-depth: 0
      - name: Fail closed unless the candidate is protected current main
        id: authorize
        env:
          GH_TOKEN: ${{ github.token }}
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        shell: bash
        run: |
          set -euo pipefail
          # --- Resolve the immutable release candidate ---
          candidate_sha="$(git rev-parse HEAD^{commit})"
          main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          test "$candidate_sha" = "$main_sha" || { echo "release target is not current origin/main" >&2; exit 1; }
          version="$(grep '^version' jellyx-desktop/Cargo.toml | head -1 | cut -d'"' -f2)"
          test -n "$version"
          tag="v${version}"
          # JELLYX_SENTRY_DSN is optional. When absent or empty, builds
          # proceed without any DSN embedded and telemetry stays completely
          # off. When present, the ephemeral DSN embedding pipeline activates
          # as before. Do not fail the release if the secret is missing.
          if [ "$GITHUB_EVENT_NAME" = push ]; then
            test "$GITHUB_REF_TYPE" = tag
            test "$GITHUB_REF_NAME" = "$tag" || { echo "tag must exactly equal Cargo-derived $tag" >&2; exit 1; }
            tag_commit="$(git rev-parse "${GITHUB_REF}^{commit}")"
            test "$tag_commit" = "$candidate_sha"
          fi
          # --- Verify the required CI check passed for this exact SHA ---
          # Branch protection is configured externally and is intentionally
          # not read here: the default GITHUB_TOKEN cannot access the branch
          # protection API (requires administration:read). Instead, the
          # required check name is fixed to the documented "Validate
          # candidate" job (see .github/workflows/validate-candidate.yml and
          # docs/BUILDING.md), and its latest check run for this exact SHA
          # must be completed with conclusion success. The check-runs API is
          # accessible with contents:read + checks:read.
          required_context="Validate candidate"
          checks="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${candidate_sha}/check-runs?per_page=100")"
          latest_check="$(jq -c --arg context "$required_context" '[.check_runs[] | select(.name == $context)] | sort_by(.completed_at // .started_at // .created_at // "") | last // empty' <<<"$checks")"
          test -n "$latest_check" && test "$(jq -r '.status' <<<"$latest_check")" = completed && test "$(jq -r '.conclusion' <<<"$latest_check")" = success || {
            echo "latest required check run is not successful for $candidate_sha: $required_context" >&2; exit 1;
          }
          echo "sha=$candidate_sha" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Linux: AppImage + .deb + .rpm
  # ---------------------------------------------------------------------------
  # AppImage is built with NO_STRIP=1 to preserve RELR relocation metadata
  # (see scripts/build-appimage.sh for the full rationale). Building on
  # ubuntu-22.04 (not latest) maximizes glibc compatibility for the AppImage
  # and .deb/.rpm targets across older distros.
  build-linux:
    name: Build Linux (AppImage, deb, rpm)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    needs: authorize-release
    outputs:
      built_sha: ${{ steps.provenance.outputs.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.authorize-release.outputs.sha }}
          persist-credentials: false

      - name: Record immutable build commit
        id: provenance
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf \
            rpm \
            file

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install root npm dependencies
        run: npm ci

      - name: Install UI npm dependencies
        run: npm ci
        working-directory: ui

      - name: Validate Rust workspace
        # Tests are validated by the "Validate candidate" CI gate on Linux.
        # Re-running cargo test here adds a flaky-test failure surface without
        # adding coverage; the gate already verified the exact SHA.
        run: cargo check --workspace

      - name: Validate UI contracts
        run: npm test && npm run check
        working-directory: ui

      - name: Validate Windows icon assets
        run: |
          python -m pip install --disable-pip-version-check -r scripts/requirements-windows-icons.txt
          python scripts/test-windows-icons.py

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Prepare ephemeral embedded Sentry DSN
        env:
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: python scripts/prepare-sentry-dsn.py

      - name: Clean stale Linux bundle outputs
        shell: bash
        run: |
          set -euo pipefail
          # --- Validate immutable release inputs ---
          bundle_dirs=(
            "target/release/bundle"
            "target/release/portable-tar"
            "jellyx-desktop/target/release/bundle"
            "jellyx-desktop/target/release/portable-tar"
          )
          for dir in "${bundle_dirs[@]}"; do
            if [ -d "$dir" ]; then
              rm -rf "$dir"
              echo "Removed stale Linux bundle output: $dir"
            fi
          done

      # Each distributable is compiled separately so its embedded channel is
      # authoritative rather than inheriting a generic multi-bundle value.
      - name: Build AppImage
        env:
          NO_STRIP: "1"
          JELLYX_INSTALL_CHANNEL: linux-appimage
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: cargo tauri build --bundles appimage

      - name: Build deb
        env:
          JELLYX_INSTALL_CHANNEL: linux-deb
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: cargo tauri build --bundles deb

      - name: Build rpm
        env:
          JELLYX_INSTALL_CHANNEL: linux-rpm
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: cargo tauri build --bundles rpm

      - name: Build portable tarball binary
        env:
          JELLYX_INSTALL_CHANNEL: linux-tarball
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: cargo build --release -p jellyx-desktop

      - name: Verify Sentry DSN executable boundary
        env:
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: python scripts/verify-sentry-dsn-boundary.py target/release/jellyx jellyx-desktop/target/release/jellyx

      - name: Remove ephemeral embedded Sentry DSN
        if: always()
        run: rm -f jellyx-desktop/.sentry-dsn.rs

      # Tauri's productName ("Jellyx Player") produces artifacts with a space
      # in the basename (e.g. "Jellyx Player_0.4.1_amd64.AppImage"), but the
      # release conventions (docs/release-conventions.md) require a dot
      # ("Jellyx.Player_0.4.1_amd64.AppImage"). Rename every "Jellyx Player*"
      # artifact in the bundle output to "Jellyx.Player*" BEFORE generating
      # checksums so the .sha256 sidecars and uploaded artifacts reference the
      # dot-named files that the validation gate expects.
      - name: Normalize Linux artifact names (Jellyx Player -> Jellyx.Player)
        shell: bash
        run: |
          set -euo pipefail
          search_root=""
          for candidate in "target/release/bundle" "jellyx-desktop/target/release/bundle"; do
            if [ -d "$candidate" ]; then
              search_root="$candidate"
              break
            fi
          done
          if [ -z "$search_root" ]; then
            echo "ERROR: No bundle directory found to normalize" >&2
            exit 1
          fi
          renamed=0
          while IFS= read -r -d '' src; do
            dir="$(dirname "$src")"
            base="$(basename "$src")"
            new_name="Jellyx.Player${base#Jellyx Player}"
            mv "$src" "$dir/$new_name"
            echo "Renamed: $base -> $new_name"
            renamed=$((renamed + 1))
          done < <(find "$search_root" -type f -name 'Jellyx Player*' -print0)
          echo "Renamed $renamed Linux artifact(s) from 'Jellyx Player' to 'Jellyx.Player'"
          if [ "$renamed" -eq 0 ]; then
            echo "WARNING: no 'Jellyx Player*' artifacts were found to rename" >&2
          fi

      # Locate each artifact, generate a SHA256 checksum next to it, and
      # expose paths to later steps via $GITHUB_OUTPUT.
      - name: Locate artifacts and generate checksums
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail

          # In a Cargo workspace, Tauri v2 places bundles under the workspace
          # root target/release/bundle/. Search there first; the member-local
          # jellyx-desktop/target/ path is kept as a legacy fallback.
          search_root=""
          for candidate in "target/release/bundle" "jellyx-desktop/target/release/bundle"; do
            if [ -d "$candidate" ]; then
              search_root="$candidate"
              break
            fi
          done

          if [ -z "$search_root" ]; then
            echo "ERROR: No bundle directory found under target/release/bundle or jellyx-desktop/target/release/bundle" >&2
            exit 1
          fi

          echo "Bundle root: $search_root"

          # --- AppImage ---
          appimage_file="$(find "$search_root/appimage" -name 'Jellyx.Player*.AppImage' -type f 2>/dev/null | head -1)"
          if [ -z "$appimage_file" ]; then
            echo "ERROR: No AppImage found under $search_root/appimage" >&2
            find "$search_root" -maxdepth 3 -type f >&2 || true
            exit 1
          fi
          appimage_hash=$(sha256sum "$appimage_file" | cut -d' ' -f1)
          appimage_hash_file="${appimage_file}.sha256"
          echo "${appimage_hash}  $(basename "$appimage_file")" > "$appimage_hash_file"

          # --- .deb ---
          deb_file="$(find "$search_root/deb" -name 'Jellyx.Player*.deb' -type f 2>/dev/null | head -1)"
          if [ -z "$deb_file" ]; then
            echo "ERROR: No .deb found under $search_root/deb" >&2
            exit 1
          fi
          deb_hash=$(sha256sum "$deb_file" | cut -d' ' -f1)
          deb_hash_file="${deb_file}.sha256"
          echo "${deb_hash}  $(basename "$deb_file")" > "$deb_hash_file"

          # --- .rpm ---
          rpm_file="$(find "$search_root/rpm" -name 'Jellyx.Player*.rpm' -type f 2>/dev/null | head -1)"
          if [ -z "$rpm_file" ]; then
            echo "ERROR: No .rpm found under $search_root/rpm" >&2
            exit 1
          fi
          rpm_hash=$(sha256sum "$rpm_file" | cut -d' ' -f1)
          rpm_hash_file="${rpm_file}.sha256"
          echo "${rpm_hash}  $(basename "$rpm_file")" > "$rpm_hash_file"

          # Cargo.toml is the version authority, including workflow_dispatch.
          version=$(grep '^version' jellyx-desktop/Cargo.toml | head -1 | cut -d'"' -f2)

          # --- portable tar.gz ---
          binary_path=""
          for candidate in "target/release/jellyx" "jellyx-desktop/target/release/jellyx"; do
            if [ -f "$candidate" ]; then
              binary_path="$candidate"
              break
            fi
          done

          if [ -z "$binary_path" ]; then
            echo "ERROR: No Linux jellyx binary found under target/release or jellyx-desktop/target/release" >&2
            exit 1
          fi

          portable_dir="target/release/portable-tar"
          mkdir -p "$portable_dir"
          tarball_path="$portable_dir/Jellyx_${version}_amd64.tar.gz"
          tar -C "$(dirname "$binary_path")" -czf "$tarball_path" "$(basename "$binary_path")"
          tarball_hash=$(sha256sum "$tarball_path" | cut -d' ' -f1)
          tarball_hash_file="${tarball_path}.sha256"
          echo "${tarball_hash}  $(basename "$tarball_path")" > "$tarball_hash_file"

          {
            echo "appimage_path=$appimage_file"
            echo "appimage_name=$(basename "$appimage_file")"
            echo "appimage_sha256_file=$appimage_hash_file"
            echo "deb_path=$deb_file"
            echo "deb_name=$(basename "$deb_file")"
            echo "deb_sha256_file=$deb_hash_file"
            echo "rpm_path=$rpm_file"
            echo "rpm_name=$(basename "$rpm_file")"
            echo "rpm_sha256_file=$rpm_hash_file"
            echo "tarball_path=$tarball_path"
            echo "tarball_name=$(basename "$tarball_path")"
            echo "tarball_sha256_file=$tarball_hash_file"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

          echo "AppImage: $appimage_file  (sha256: $appimage_hash)"
          echo "deb:      $deb_file  (sha256: $deb_hash)"
          echo "rpm:      $rpm_file  (sha256: $rpm_hash)"
          echo "tar.gz:   $tarball_path  (sha256: $tarball_hash)"
          echo "Version:  $version"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyx-linux-appimage-${{ steps.artifacts.outputs.version }}
          path: |
            ${{ steps.artifacts.outputs.appimage_path }}
            ${{ steps.artifacts.outputs.appimage_sha256_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyx-linux-deb-${{ steps.artifacts.outputs.version }}
          path: |
            ${{ steps.artifacts.outputs.deb_path }}
            ${{ steps.artifacts.outputs.deb_sha256_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyx-linux-rpm-${{ steps.artifacts.outputs.version }}
          path: |
            ${{ steps.artifacts.outputs.rpm_path }}
            ${{ steps.artifacts.outputs.rpm_sha256_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyx-linux-targz-${{ steps.artifacts.outputs.version }}
          path: |
            ${{ steps.artifacts.outputs.tarball_path }}
            ${{ steps.artifacts.outputs.tarball_sha256_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Generate release body
        id: body
        shell: bash
        run: |
          # Determine the previous version tag for the changelog link.
          # Use the tag that v* tags sort before the current one.
          version="${{ steps.artifacts.outputs.version }}"
          current_tag="v${version}"
          prev_tag="$(git tag --sort=-version:refname | grep -E '^v[0-9]' | grep -v "$current_tag" | head -1 || true)"
          if [ -z "$prev_tag" ]; then
            prev_tag="$current_tag"
          fi
           chmod +x scripts/generate-release-body.sh
           ./scripts/generate-release-body.sh "$version" "$prev_tag" > release-body.md
           sha256sum release-body.md > release-body.md.sha256
           echo "body_file=${PWD}/release-body.md" >> "$GITHUB_OUTPUT"

      # This script runs only in the read-token build job. The promotion job
      # consumes the resulting data and never executes repository scripts.
      - name: Upload release body artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyx-release-body
          path: |
            ${{ steps.body.outputs.body_file }}
            ${{ steps.body.outputs.body_file }}.sha256
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Windows: MSI + NSIS setup.exe + portable jellyx.exe
  # ---------------------------------------------------------------------------
  # Tauri builds both MSI and NSIS in one invocation (single build, packaged
  # twice). The portable .exe is the raw release binary copied out of the
  # target directory. MSI metadata is extracted for winget submission.
  build-windows:
    name: Build Windows (MSI, NSIS, portable)
    runs-on: windows-latest
    permissions:
      contents: read
    needs: authorize-release
    outputs:
      built_sha: ${{ steps.provenance.outputs.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.authorize-release.outputs.sha }}
          persist-credentials: false

      - name: Record immutable build commit
        id: provenance
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}-v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install root npm dependencies
        run: npm ci

      - name: Install UI npm dependencies
        run: npm ci
        working-directory: ui

      - name: Validate Rust workspace
        run: cargo check --workspace
        # Tests are validated by the "Validate candidate" CI gate on Linux.
        # Windows runners crash on PlaybackService tests that open TCP/CPAL.

      - name: Validate UI contracts
        run: npm test && npm run check
        working-directory: ui

      - name: Validate Windows icon assets
        run: |
          python -m pip install --disable-pip-version-check -r scripts/requirements-windows-icons.txt
          python scripts/test-windows-icons.py

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked --force

      - name: Prepare ephemeral embedded Sentry DSN
        shell: bash
        env:
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: python scripts/prepare-sentry-dsn.py

      - name: Clean stale Windows bundle outputs
        shell: pwsh
        run: |
          $bundleDirs = @(
            "target/release/bundle/msi",
            "target/release/bundle/nsis",
            "jellyx-desktop/target/release/bundle/msi",
            "jellyx-desktop/target/release/bundle/nsis"
          )
          foreach ($dir in $bundleDirs) {
            if (Test-Path $dir) {
              Remove-Item -Path $dir -Recurse -Force
              Write-Host "Removed stale bundle output: $dir"
            }
          }

      # Installers must embed their own canonical channel.
      - name: Build MSI
        env:
          JELLYX_INSTALL_CHANNEL: windows-msi
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: cargo tauri build --bundles msi

      - name: Build NSIS
        env:
          JELLYX_INSTALL_CHANNEL: windows-nsis
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: cargo tauri build --bundles nsis

      - name: Build portable executable
        env:
          JELLYX_INSTALL_CHANNEL: windows-portable
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: cargo build --release -p jellyx-desktop

      - name: Verify Sentry DSN executable boundary
        shell: bash
        env:
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: python scripts/verify-sentry-dsn-boundary.py target/release/jellyx.exe jellyx-desktop/target/release/jellyx.exe

      - name: Remove ephemeral embedded Sentry DSN
        if: always()
        shell: bash
        run: rm -f jellyx-desktop/.sentry-dsn.rs

      # Tauri's productName ("Jellyx Player") produces installer artifacts
      # with a space in the basename (e.g. "Jellyx Player_0.4.1_x64_en-US.msi"
      # and "Jellyx Player_0.4.1_x64-setup.exe"), but the release conventions
      # (docs/release-conventions.md) require a dot
      # ("Jellyx.Player_0.4.1_x64_en-US.msi"). Rename every "Jellyx Player*"
      # artifact in the MSI/NSIS bundle output to "Jellyx.Player*" BEFORE
      # generating checksums so the .sha256 sidecars and uploaded artifacts
      # reference the dot-named files that the validation gate expects. The
      # portable jellyx.exe is not affected (it does not use productName).
      - name: Normalize Windows artifact names (Jellyx Player -> Jellyx.Player)
        shell: pwsh
        run: |
          $searchDirs = @(
            "target/release/bundle/msi",
            "target/release/bundle/nsis",
            "jellyx-desktop/target/release/bundle/msi",
            "jellyx-desktop/target/release/bundle/nsis"
          )
          $renamed = 0
          foreach ($dir in $searchDirs) {
            if (-not (Test-Path $dir)) { continue }
            Get-ChildItem -Path $dir -Filter "Jellyx Player*" -File | ForEach-Object {
              $newName = "Jellyx.Player" + $_.Name.Substring("Jellyx Player".Length)
              $dest = Join-Path $_.DirectoryName $newName
              Move-Item -Path $_.FullName -Destination $dest -Force
              Write-Host "Renamed: $($_.Name) -> $newName"
              $renamed++
            }
          }
          Write-Host "Renamed $renamed Windows artifact(s) from 'Jellyx Player' to 'Jellyx.Player'"
          if ($renamed -eq 0) {
            Write-Error "No 'Jellyx Player*' artifacts were found to rename"
            exit 1
          }

      # Locate the raw release executable (no installer wrapper) and hash it.
      - name: Locate portable exe
        id: portable
        shell: pwsh
        run: |
          $searchDirs = @(
            "target/release",
            "jellyx-desktop/target/release"
          )
          $exeFile = $null
          foreach ($dir in $searchDirs) {
            if (Test-Path $dir) {
              $candidate = Get-ChildItem -Path $dir -Filter "jellyx.exe" | Select-Object -First 1
              if ($candidate) {
                $exeFile = $candidate
                break
              }
            }
          }
          if (-not $exeFile) {
            Write-Error "No portable jellyx.exe found in expected directories: $($searchDirs -join ', ')"
            exit 1
          }
          Write-Host "Portable exe found: $($exeFile.FullName)"
          $hash = (Get-FileHash -Path $exeFile.FullName -Algorithm SHA256).Hash
          $hashFile = "$($exeFile.FullName).sha256"
          "$hash  $($exeFile.Name)" | Out-File -FilePath $hashFile -Encoding utf8 -NoNewline
          echo "exe_path=$($exeFile.FullName)" >> $env:GITHUB_OUTPUT
          echo "exe_name=$($exeFile.Name)" >> $env:GITHUB_OUTPUT
          echo "sha256_file=$hashFile" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $hash"

      - name: Locate MSI output
        id: msi
        shell: pwsh
        run: |
          # Cargo.toml is the version authority, including workflow_dispatch.
          $version = (Select-String -Path "jellyx-desktop/Cargo.toml" -Pattern '^version = "([^"]+)"' | Select-Object -First 1).Matches.Groups[1].Value

          $searchDirs = @(
            "target/release/bundle/msi",
            "jellyx-desktop/target/release/bundle/msi"
          )

          $msiFile = $null
          foreach ($dir in $searchDirs) {
            if (Test-Path $dir) {
              $candidate = Get-ChildItem -Path $dir -Filter "Jellyx.Player*${version}_*.msi" |
                Select-Object -First 1
              if ($candidate) {
                $msiFile = $candidate
                break
              }
            }
          }

          if (-not $msiFile) {
            Write-Error "No MSI file for version $version found in expected directories: $($searchDirs -join ', ')"
            foreach ($dir in $searchDirs) {
              if (Test-Path $dir) {
                Get-ChildItem -Path $dir -Filter "*.msi" | ForEach-Object { Write-Error "Found non-matching MSI: $($_.FullName)" }
              }
            }
            exit 1
          }

          if ($msiFile.Name -notlike "Jellyx.Player*${version}*") {
            Write-Error "Selected MSI '$($msiFile.Name)' does not match 'Jellyx.Player*${version}*'"
            exit 1
          }

          Write-Host "MSI found: $($msiFile.FullName)"

          $hash = (Get-FileHash -Path $msiFile.FullName -Algorithm SHA256).Hash
          $hashFile = "$($msiFile.FullName).sha256"
          "$hash  $($msiFile.Name)" | Out-File -FilePath $hashFile -Encoding utf8 -NoNewline

          echo "msi_path=$($msiFile.FullName)" >> $env:GITHUB_OUTPUT
          echo "msi_name=$($msiFile.Name)" >> $env:GITHUB_OUTPUT
          echo "msi_dir=$($msiFile.DirectoryName)" >> $env:GITHUB_OUTPUT
          echo "sha256_file=$hashFile" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT

          Write-Host "SHA256: $hash"
          Write-Host "Version: $version"

      - name: Locate NSIS output
        id: nsis
        shell: pwsh
        run: |
          # Cargo.toml is the version authority, including workflow_dispatch.
          $version = (Select-String -Path "jellyx-desktop/Cargo.toml" -Pattern '^version = "([^"]+)"' | Select-Object -First 1).Matches.Groups[1].Value

          $searchDirs = @(
            "target/release/bundle/nsis",
            "jellyx-desktop/target/release/bundle/nsis"
          )

          $nsisFile = $null
          foreach ($dir in $searchDirs) {
            if (Test-Path $dir) {
              $candidate = Get-ChildItem -Path $dir -Filter "Jellyx.Player*${version}_*setup*.exe" |
                Select-Object -First 1
              if ($candidate) {
                $nsisFile = $candidate
                break
              }
            }
          }

          if (-not $nsisFile) {
            Write-Error "No NSIS setup.exe for version $version found in expected directories: $($searchDirs -join ', ')"
            foreach ($dir in $searchDirs) {
              if (Test-Path $dir) {
                Get-ChildItem -Path $dir -Filter "*.exe" | ForEach-Object { Write-Error "Found non-matching NSIS candidate: $($_.FullName)" }
              }
            }
            exit 1
          }

          if ($nsisFile.Name -notlike "Jellyx.Player*${version}*") {
            Write-Error "Selected NSIS '$($nsisFile.Name)' does not match 'Jellyx.Player*${version}*'"
            exit 1
          }

          Write-Host "NSIS found: $($nsisFile.FullName)"

          $hash = (Get-FileHash -Path $nsisFile.FullName -Algorithm SHA256).Hash
          $hashFile = "$($nsisFile.FullName).sha256"
          "$hash  $($nsisFile.Name)" | Out-File -FilePath $hashFile -Encoding utf8 -NoNewline

          echo "nsis_path=$($nsisFile.FullName)" >> $env:GITHUB_OUTPUT
          echo "nsis_name=$($nsisFile.Name)" >> $env:GITHUB_OUTPUT
          echo "nsis_dir=$($nsisFile.DirectoryName)" >> $env:GITHUB_OUTPUT
          echo "nsis_sha256_file=$hashFile" >> $env:GITHUB_OUTPUT

          Write-Host "SHA256: $hash"

      # Inspect MSI metadata (ProductCode, UpgradeCode) — used to update the
      # winget manifest after release. Uploaded as an artifact, not to the
      # Release (it's a maintainer reference, not a user download).
      - name: Inspect MSI metadata
        id: inspect
        shell: pwsh
        run: |
          $outFile = Join-Path (Split-Path "${{ steps.msi.outputs.msi_path }}") "msi-metadata.txt"
          .\scripts\inspect-msi.ps1 -MsiPath "${{ steps.msi.outputs.msi_path }}" | Tee-Object -FilePath $outFile
          echo "metadata_file=$outFile" >> $env:GITHUB_OUTPUT

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyx-windows-msi-${{ steps.msi.outputs.version }}
          path: |
            ${{ steps.msi.outputs.msi_path }}
            ${{ steps.msi.outputs.sha256_file }}
            ${{ steps.inspect.outputs.metadata_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyx-windows-setup-${{ steps.msi.outputs.version }}
          path: |
            ${{ steps.nsis.outputs.nsis_path }}
            ${{ steps.nsis.outputs.nsis_sha256_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyx-windows-portable-${{ steps.msi.outputs.version }}
          path: |
            ${{ steps.portable.outputs.exe_path }}
            ${{ steps.portable.outputs.sha256_file }}
          if-no-files-found: error
          retention-days: 30

  build-macos:
    name: Build macOS DMG
    uses: ./.github/workflows/macos-dmg.yml
    with:
      release_ref: ${{ needs.authorize-release.outputs.sha }}
    secrets: inherit
    needs: authorize-release

  validate-release-assets:
    name: Validate staged release artifacts
    runs-on: ubuntu-22.04
    needs:
      - authorize-release
      - build-linux
      - build-windows
      - build-macos
    permissions:
      contents: read
    steps:
      - name: Download staged platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jellyx-*
          path: release-assets
      - name: Download pre-rendered release body
        uses: actions/download-artifact@v4
        with:
          name: jellyx-release-body
          path: release-body
      - name: Validate assets and generate content-addressed manifest
        env:
          RELEASE_VERSION: ${{ needs.authorize-release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          version="$RELEASE_VERSION"
          test -f release-body/release-body.md
          test -f release-body/release-body.md.sha256
          (cd release-body && sha256sum -c release-body.md.sha256)
          mapfile -t assets < <(find release-assets -type f \( \
            -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' \
            -o -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.sha256' \
          \) ! -name 'release-body.md.sha256' ! -name 'release-manifest.sha256' | sort)
          required=(
            "Jellyx.Player_${version}_amd64.AppImage" "Jellyx.Player_${version}_amd64.AppImage.sha256"
            "Jellyx.Player-${version}-1.x86_64.rpm" "Jellyx.Player-${version}-1.x86_64.rpm.sha256"
            "Jellyx.Player_${version}_amd64.deb" "Jellyx.Player_${version}_amd64.deb.sha256"
            "Jellyx_${version}_amd64.tar.gz" "Jellyx_${version}_amd64.tar.gz.sha256"
            "Jellyx.Player_${version}_x64-setup.exe" "Jellyx.Player_${version}_x64-setup.exe.sha256"
            "Jellyx.Player_${version}_x64_en-US.msi" "Jellyx.Player_${version}_x64_en-US.msi.sha256"
            "jellyx.exe" "jellyx.exe.sha256"
            "Jellyx.Player_${version}_aarch64.dmg" "Jellyx.Player_${version}_aarch64.dmg.sha256"
          )
          mapfile -t staged_names < <(printf '%s\n' "${assets[@]}" | xargs -n1 basename | sort)
          mapfile -t expected_names < <(printf '%s\n' "${required[@]}" | sort)

          # --- Diagnostic context (point 4) ---
          echo "Found ${#assets[@]} staged asset file(s) with full paths:"
          for f in "${assets[@]}"; do echo "  $f"; done
          echo ""
          echo "Staged:"
          for name in "${staged_names[@]}"; do echo "  $name"; done
          echo ""
          echo "Expected:"
          for name in "${expected_names[@]}"; do echo "  $name"; done
          echo ""

          # --- Compare staged vs expected (points 1 & 2) ---
          if [ "${staged_names[*]}" != "${expected_names[*]}" ]; then
            echo "ERROR: staged asset names do not match expected names" >&2
            echo "" >&2
            echo "Missing (expected but not staged):" >&2
            comm -23 <(printf '%s\n' "${expected_names[@]}") <(printf '%s\n' "${staged_names[@]}") >&2
            echo "" >&2
            echo "Extra (staged but not expected):" >&2
            comm -13 <(printf '%s\n' "${expected_names[@]}") <(printf '%s\n' "${staged_names[@]}") >&2
            exit 1
          fi

          # --- Verify each checksum sidecar (point 3) ---
          for checksum in "${assets[@]}"; do
            [[ "$checksum" == *.sha256 ]] || continue
            echo "Verifying checksum: $checksum"
            echo "  Content: $(cat "$checksum")"
            echo "  Directory listing of $(dirname "$checksum"):"
            ls -1 "$(dirname "$checksum")" | sed 's/^/    /'
            if (cd "$(dirname "$checksum")" && sha256sum -c "$(basename "$checksum")"); then
              echo "  Result: OK"
            else
              echo "  Result: FAILED — see sha256sum output above" >&2
              exit 1
            fi
          done
          sha256sum "${assets[@]}" release-body/release-body.md > release-manifest.sha256
      - name: Upload validated content manifest
        uses: actions/upload-artifact@v4
        with:
          name: jellyx-release-manifest
          path: release-manifest.sha256
          if-no-files-found: error
          retention-days: 30

  stage-and-publish-release:
    name: Stage, validate, and publish release
    runs-on: ubuntu-22.04
    needs:
      - build-linux
      - build-windows
      - build-macos
      - authorize-release
      - validate-release-assets
    permissions:
      contents: write
    environment: release

    steps:
      # This write-token job intentionally does not checkout the repository,
      # retain checkout credentials, or execute repository/downloaded scripts.
      - name: Verify immutable build provenance
        id: provenance
        env:
          BUILD_LINUX_SHA: ${{ needs.build-linux.outputs.built_sha }}
          BUILD_WINDOWS_SHA: ${{ needs.build-windows.outputs.built_sha }}
          BUILD_MACOS_SHA: ${{ needs.build-macos.outputs.built_sha }}
          AUTHORIZED_SHA: ${{ needs.authorize-release.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          built_sha="$BUILD_LINUX_SHA"
          test -n "$built_sha"
          test "$BUILD_WINDOWS_SHA" = "$built_sha"
          test "$BUILD_MACOS_SHA" = "$built_sha"
          test "$AUTHORIZED_SHA" = "$built_sha" || { echo "build target differs from authorized main SHA" >&2; exit 1; }
          echo "sha=$built_sha" >> "$GITHUB_OUTPUT"

      - name: Download staged platform artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0, audited
        with:
          pattern: jellyx-*
          path: release-assets

      - name: Download pre-rendered release body
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0, audited
        with:
          name: jellyx-release-body
          path: release-body

      - name: Download validated content manifest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0, audited
        with:
          name: jellyx-release-manifest
          path: release-manifest

      - name: Create draft, validate assets, and publish atomically
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILT_SHA: ${{ steps.provenance.outputs.sha }}
          RELEASE_TAG: ${{ needs.authorize-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.authorize-release.outputs.version }}
        run: |
          set -euo pipefail
          version="$RELEASE_VERSION"
          release_tag="$RELEASE_TAG"
          test "$release_tag" = "v${version}" || { echo "authorization tag/version mismatch" >&2; exit 1; }
          test -f release-body/release-body.md
          test -f release-manifest/release-manifest.sha256
          # --- Revalidate read-only validator output before write-token use ---
          # The read-only validator emitted this manifest after checking the
          # exact asset set and every sidecar checksum. Recheck all content
          # digests here before any write-token publication.
          sha256sum -c release-manifest/release-manifest.sha256
          if gh release view "$release_tag" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq '.isDraft' >/dev/null 2>&1; then
            test "$(gh release view "$release_tag" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq '.isDraft')" = "true"
            gh release delete "$release_tag" --repo "${GITHUB_REPOSITORY}" --yes
          fi
          # --- Recheck authorization immediately before publication ---
          # Recheck the protected branch immediately before every publication
          # mutation. A moved main head fails closed rather than releasing stale
          # artifacts. The authorization job already verified required checks
          # for this exact immutable SHA.
          test "$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')" = "$BUILT_SHA" || {
            echo "origin/main moved after authorization" >&2; exit 1;
          }
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${release_tag}" --jq '.object.sha' >/dev/null 2>&1; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" -f "ref=refs/tags/${release_tag}" -f "sha=${BUILT_SHA}" >/dev/null
          fi
          git init tag-verification >/dev/null
          git -C tag-verification remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C tag-verification fetch --depth=1 origin "refs/tags/${release_tag}"
          tag_commit="$(git -C tag-verification rev-parse 'FETCH_HEAD^{commit}')"
          test "$tag_commit" = "$BUILT_SHA" || { echo "release tag commit targets another SHA" >&2; exit 1; }
          rm -rf tag-verification
          # The tag already exists and points to BUILT_SHA (verified above).
          # gh release create with the tag name uses it as the release target.
          gh release create "$release_tag" --repo "${GITHUB_REPOSITORY}" --draft --target "$BUILT_SHA" --title "Jellyx ${version}" --notes-file release-body/release-body.md
          # Verify the draft release was created and is associated with the tag.
          # gh release view handles drafts correctly (unlike gh api /releases/tags/ which 404s on drafts).
          release_target="$(gh release view "$release_tag" --repo "${GITHUB_REPOSITORY}" --json targetCommitish --jq '.targetCommitish')"
          test "$release_target" = "$BUILT_SHA" || {
            echo "draft release target does not match built commit" >&2; exit 1;
          }

          # --- Publish the exact validated asset set ---
          mapfile -t assets < <(find release-assets -type f \( \
            -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.tar.gz' \
            -o -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.sha256' \
          \) ! -name 'release-body.md.sha256' ! -name 'release-manifest.sha256' | sort)
          test "${#assets[@]}" -gt 0
          gh release upload "$release_tag" --repo "${GITHUB_REPOSITORY}" "${assets[@]}"
          release_json="$(gh release view "$release_tag" --repo "${GITHUB_REPOSITORY}" --json name,assets)"
          test "$(printf '%s' "$release_json" | jq -r '.name')" = "Jellyx ${version}"
          actual_assets="$(printf '%s' "$release_json" | jq -r '.assets[].name')"
          expected_asset_count="$(grep -c ' release-assets/' release-manifest/release-manifest.sha256)"
          test "$(printf '%s\n' "$actual_assets" | sed '/^$/d' | wc -l | tr -d ' ')" = "$expected_asset_count"
          gh release edit "$release_tag" --repo "${GITHUB_REPOSITORY}" --draft=false

          # Any failure above leaves a non-public draft with its staged assets
          # for inspection or deletion; no partial release is made public.
