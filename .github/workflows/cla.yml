name: CLA Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if CLA is accepted
        id: cla-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # List of users who have accepted the CLA
          CLA_SIGNED_URL="https://raw.githubusercontent.com/netcraker01/jellyx-player/main/.github/cla-signers.txt"

          # Check if author is in the signed list
          if curl -s "$CLA_SIGNED_URL" | grep -qi "^${PR_AUTHOR}$"; then
            echo "cla_signed=true" >> $GITHUB_ENV
            echo "✅ CLA already signed by $PR_AUTHOR"
          else
            echo "cla_signed=false" >> $GITHUB_ENV
            # Check if the PR body contains the agreement
            PR_BODY=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" --jq '.body // ""')
            if echo "$PR_BODY" | grep -qi "I have read and agree to the CLA"; then
              echo "cla_signed=true" >> $GITHUB_ENV
              echo "✅ CLA accepted in PR body"
            else
              echo "❌ CLA not accepted yet"
              echo "Add this exact sentence to the PR body: I have read and agree to the CLA"
              exit 1
            fi
          fi
