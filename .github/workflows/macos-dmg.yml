# =============================================================================
# Jellyx Player — macOS DMG Build (CI validation)
# =============================================================================
# Builds the macOS DMG installer for releases, PR validation, and manual runs.
# We intentionally do NOT run this on every push to main because GitHub-hosted
# macOS runners are scarce and queued runs can delay real release work.
#
# The release pipeline lives in .github/workflows/release.yml for Linux/Windows.
# This workflow uploads DMGs only as artifacts. The release workflow invokes it
# as a reusable workflow and publishes all platform assets after validation.
#
# Architecture support for the current alpha:
#   - macos-14 runner (Apple Silicon M1) → builds aarch64-apple-darwin
# Intel DMGs are intentionally deferred until we have a reliable macOS runner
# path that does not block release promotion.
#
# Outputs:
#   - Uploads DMG + SHA256 as GitHub Actions artifacts (all builds)
#
# After a successful release build, update the Homebrew cask with the
# checksums from the uploaded .sha256 files (see docs/packaging.md).
# =============================================================================

name: macOS DMG

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Git ref to build (example: v0.4.1)"
        required: false
        type: string
  workflow_call:
    inputs:
      release_ref:
        required: true
        type: string
    outputs:
      built_sha:
        value: ${{ jobs.build-dmg.outputs.built_sha }}
    secrets:
      JELLYX_SENTRY_DSN:
        required: false

concurrency:
  group: macos-dmg-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-dmg:
    name: Build macOS DMG (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    outputs:
      built_sha: ${{ steps.provenance.outputs.sha }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            arch_suffix: aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_ref || github.ref }}

      - name: Record immutable build commit
        id: provenance
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install root npm dependencies
        run: npm ci

      - name: Install UI npm dependencies
        run: npm ci
        working-directory: ui

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Prepare ephemeral embedded Sentry DSN
        env:
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: python scripts/prepare-sentry-dsn.py

      - name: Build DMG
        env:
          JELLYX_INSTALL_CHANNEL: macos-dmg
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: cargo tauri build --bundles dmg --target ${{ matrix.target }}

      - name: Verify Sentry DSN executable boundary
        env:
          JELLYX_SENTRY_DSN: ${{ secrets.JELLYX_SENTRY_DSN }}
        run: python scripts/verify-sentry-dsn-boundary.py target/${{ matrix.target }}/release/jellyx jellyx-desktop/target/${{ matrix.target }}/release/jellyx

      - name: Remove ephemeral embedded Sentry DSN
        if: always()
        run: rm -f jellyx-desktop/.sentry-dsn.rs

      - name: Locate DMG output
        id: dmg
        shell: bash
        run: |
          # In a Cargo workspace, Tauri v2 places bundles under the workspace
          # root target/<target>/release/bundle/dmg/. Search there first; the
          # member-local jellyx-desktop/target/ paths are legacy fallbacks.
          search_dirs=(
            "target/${{ matrix.target }}/release/bundle/dmg"
            "target/release/bundle/dmg"
            "jellyx-desktop/target/${{ matrix.target }}/release/bundle/dmg"
            "jellyx-desktop/target/release/bundle/dmg"
          )

          dmg_file=""
          for dir in "${search_dirs[@]}"; do
            if [ -d "$dir" ]; then
              candidate=$(find "$dir" -name '*.dmg' -type f | head -1)
              if [ -n "$candidate" ]; then
                dmg_file="$candidate"
                break
              fi
            fi
          done

          if [ -z "$dmg_file" ]; then
            echo "ERROR: No DMG file found in expected directories"
            for dir in "${search_dirs[@]}"; do
              echo "  Checked: $dir"
            done
            exit 1
          fi

          # Extract version from the release ref, tag name, or Cargo.toml.
          build_ref="${{ inputs.release_ref || github.ref_name }}"
          build_ref="${build_ref#refs/tags/}"
          version="${build_ref#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            version=$(grep '^version' jellyx-desktop/Cargo.toml | head -1 | cut -d'"' -f2)
          fi

          # The release gate consumes this exact documented Apple Silicon name;
          # normalize Tauri's bundle basename before generating its checksum.
          dmg_dir=$(dirname "$dmg_file")
          dmg_name="Jellyx.Player_${version}_aarch64.dmg"
          normalized_dmg="$dmg_dir/$dmg_name"
          if [ "$dmg_file" != "$normalized_dmg" ]; then
            mv "$dmg_file" "$normalized_dmg"
          fi
          dmg_file="$normalized_dmg"

          # Generate SHA256 checksum after normalization so it names the asset.
          hash=$(shasum -a 256 "$dmg_file" | cut -d' ' -f1)
          hash_file="${dmg_file}.sha256"
          echo "${hash}  ${dmg_name}" > "$hash_file"

          echo "dmg_path=$dmg_file" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$dmg_name" >> "$GITHUB_OUTPUT"
          echo "dmg_dir=$dmg_dir" >> "$GITHUB_OUTPUT"
          echo "sha256_file=$hash_file" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          echo "DMG found: $dmg_file"
          echo "SHA256: $hash"
          echo "Version: $version"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyx-player-dmg-${{ matrix.arch_suffix }}-${{ steps.dmg.outputs.version }}
          path: |
            ${{ steps.dmg.outputs.dmg_path }}
            ${{ steps.dmg.outputs.sha256_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Output build summary
        shell: bash
        run: |
          echo "=========================================="
          echo "  Jellyx Player — macOS DMG Build Output"
          echo "=========================================="
          echo ""
          echo "DMG file:       ${{ steps.dmg.outputs.dmg_name }}"
          echo "Architecture:   ${{ matrix.target }}"
          echo "Version:        ${{ steps.dmg.outputs.version }}"
          echo ""
          echo "After a published release, update the Homebrew cask with:"
          echo "  1. Download the .sha256 file from the artifact"
          echo "  2. Update packaging/homebrew/Casks/jellyx-player.rb"
          echo "     with the version, URL, and SHA256 per architecture"
